# Smoke Tests — pi-agents
#
# Run from the pi-agents project root.
# Requires: pi CLI installed, ANTHROPIC_API_KEY set.
#
# Usage:
#   pia -p "<prompt>"
#   OR
#   pi -e ./src/index.ts -p "<prompt>"

extension_loads:
  description: Extension loads without errors
  command: pia -p "say hello, do not use any tools"
  expect: A greeting response, no errors

agents_command:
  description: /agents lists discovered agents with icon + name + description
  command: pia -p "/agents"
  expect: List showing scout and backend-dev with icons and descriptions
  note: May show no output in print mode — use interactive mode instead

single_mode:
  description: Single agent invocation — scout reads the project
  command: >
    pia -p "Use the agent tool in single mode: invoke scout with task
    'count how many .ts files are in src/ (not test files)'"
  expect: A count of ~23 .ts files with directory breakdown
  verifies:
    - Agent tool registered and callable by LLM
    - Scout agent discovered and invoked via SDK
    - Domain enforcement (scout can only read src/ and docs/)
    - Output returned to parent LLM and synthesized

parallel_mode:
  description: Two agents run concurrently on independent tasks
  command: >
    pia -p "Use the agent tool in parallel mode with two tasks:
    scout agent task 'list all files in src/schema/'
    and scout agent task 'list all files in src/domain/'"
  expect: Two separate file listings merged by the parent LLM
  verifies:
    - Parallel execution (both scouts run concurrently)
    - Multiple results combined in parent LLM response
    - Each agent has isolated context

chain_mode:
  description: Sequential agents — output of step 1 feeds step 2 via {previous}
  command: >
    pia -p "Use the agent tool in chain mode:
    first scout with task 'find the main entry point file and list its imports',
    then scout with task 'based on {previous}, find what AgentFrontmatterSchema exports and its fields'"
  expect: Step 1 finds index.ts imports, step 2 drills into schema details
  verifies:
    - Chain execution (sequential, not parallel)
    - "{previous}" placeholder replaced with step 1 output
    - Step 2 agent sees step 1 results in its task

backend_dev_tdd:
  description: Backend-dev agent writes code following TDD
  command: >
    pia -p "Use the agent tool to invoke backend-dev with task:
    'read src/common/paths.ts then add a test in src/common/paths.test.ts
    that verifies expandPath returns the input unchanged for relative paths
    like ./foo/bar. Follow TDD.'"
  expect: Agent writes a failing test first, then confirms it passes
  verifies:
    - Backend-dev agent has write access to src/
    - TDD process followed (test before implementation)
    - bash tool works (runs npm test)
    - Agent reports test results

domain_enforcement:
  description: Agent blocked from writing outside its domain
  command: >
    pia -p "Use the agent tool to invoke scout with task:
    'create a new file at src/test-file.txt with content hello'"
  expect: Scout fails — it has read-only domain, no write tool
  verifies:
    - Scout only has read/grep/find/ls tools (no write)
    - Domain violation handled gracefully

conversation_log:
  description: Verify conversation log written after invocation
  command: >
    find .pi/sessions -name "conversation.jsonl" -newer package.json
    -exec wc -l {} \; -exec head -1 {} \;
  expect: At least one log file with entries (from/to/message fields)
  verifies:
    - Extension creates session directory
    - User task written before invocation
    - Agent response written after completion
    - JSONL format with ts/from/to/message

knowledge_update:
  description: Agent updates its knowledge file after meaningful work
  command: >
    pia -p "Use the agent tool to invoke scout with task:
    'explore the full project structure and update your knowledge files
    with what you find'"
  post_check: cat .pi/knowledge/scout.yaml
  expect: YAML file contains project structure observations
  verifies:
    - mental-model skill instructs agent to update knowledge
    - Agent has implicit write access to its knowledge files
    - Knowledge file persists across sessions
